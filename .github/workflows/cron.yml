name: Remind Cron

on:
  schedule:
    # 毎時0分（UTC）に実行。JST 09:00, 10:00, 11:00... に対応
    - cron: '0 * * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call remind API
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://raku-kyaba.vercel.app/api/remind"
