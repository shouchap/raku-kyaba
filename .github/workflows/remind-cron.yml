# Vercel Hobby は 1 日 1 回までの Cron のため、店舗ごとの「時」に合わせたリマインドは
# 毎時このワークフローから GET /api/remind を呼び出す。
# リポジトリ Secrets: CRON_SECRET, REMIND_APP_URL（例: https://raku-kyaba.vercel.app）
name: Remind (hourly JST gate in API)
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}
jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/remind
        env:
          URL: ${{ secrets.REMIND_APP_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "REMIND_APP_URL and CRON_SECRET must be set in repo secrets"
            exit 1
          fi
          curl -sS -f -H "Authorization: Bearer ${SECRET}" "${URL%/}/api/remind"
